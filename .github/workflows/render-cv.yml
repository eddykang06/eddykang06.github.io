# Example Workflow File
# This is a placeholder for the actual content of your workflow file.

name: Render CV

on:
  push:
    branches: [ main ]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Render CV
        run: npm run rendercv --verbose
        env:
          NODE_ENV: production

      - name: Output results
        run: echo 'Render completed successfully.'